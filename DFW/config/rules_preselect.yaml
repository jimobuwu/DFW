# rules_preselect.yaml
# 量化初选规则配置文件
# pipeline/select_stock.py 读取本文件中的参数

# ── 全局设置 ─────────────────────────────────────────────────────────
global:
  data_dir: "./data/raw"          # A股日线CSV目录
  output_dir: "./data/candidates" # 候选结果输出目录
  top_m: 5000                     # 流动性池：取成交额最高的 top_m 只
  n_turnover_days: 43             # 滚动成交额窗口（日）
  min_bars_buffer: 10             # 额外的最小 bar 缓冲

# ── B1 策略参数（KDJ + 知行均线多头排列） ────────────────────────────
b1:
  enabled: true
  zx_m1: 14
  zx_m2: 28
  zx_m3: 57
  zx_m4: 114
  j_threshold: 15.0
  j_q_threshold: 0.10

# ── B2 策略参数（B1 后缩量回调 + 倍量反包） ──────────────────────────
b2:
  enabled: true
  b1_lookback: 30               # B1 买点回溯窗口（日）
  min_shrink_days: 2            # 缩量回调最少天数
  volume_ratio: 1.3             # 放量倍数阈值（1.3 = 30%+）
  zxdkx_tolerance: 0.03         # 回调到黄线附近的容差（3%）
  max_return: 0.098             # 今日最大涨幅（排除涨停追高）
  no_long_lower_shadow: true    # 排除大长下影线
  shadow_body_ratio: 1.5        # 下影线/实体比阈值
  require_weekly_ma_bull: true  # 要求周线多头排列

# ── 砖型图（BrickChart）策略参数 ──────────────────────────────────────
brick:
  enabled: true

  # 砖型图计算参数
  n: 8
  m1: 3
  m2: 12
  m3: 12
  t: 8
  shift1: 92
  shift2: 114
  sma_w1: 1
  sma_w2: 1
  sma_w3: 1

  # 选股过滤阈值
  daily_return_threshold: 0.2    # 今日涨幅上限
  brick_growth_ratio: 0.5         # 今日红柱 >= N × 昨日绿柱绝对值
  min_prior_green_bars: 1         # 红柱前至少有几根连续绿柱

  # 知行线参数
  zxdq_ratio: 1.47                 # 收盘价 < zxdq × ratio；null = 不启用
  zxdq_span: 10
  require_zxdq_gt_zxdkx: true
  zxdkx_m1: 14
  zxdkx_m2: 28
  zxdkx_m3: 57
  zxdkx_m4: 114

  # 周线均线多头排列
  require_weekly_ma_bull: true
  wma_short: 5
  wma_mid: 10
  wma_long: 20

  # 大上影线排除（砖型图形态红线）
  filter_upper_shadow: true
  upper_shadow_ratio: 1.5       # 上影线 > 实体 × ratio 则排除

  # 白黄线距离过滤（双线战法：白线距黄线太远成功率低）
  filter_zx_spread: true
  max_zx_spread: 0.15           # (zxdq - zxdkx) / zxdkx > 15% 则排除
